<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BROLET</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#3b82f6,#9333ea);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:900px;
    background:white;
    border-radius:20px;
    overflow:hidden;
    display:flex;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.sidebar{
    width:220px;
    background:#1e293b;
    color:white;
    padding:20px;
}

.logo{
    font-size:35px;
    font-weight:bold;
    color:#60a5fa;
    margin-bottom:30px;
}

.menu button{
    width:100%;
    padding:14px;
    margin-bottom:12px;
    border:none;
    border-radius:10px;
    background:#334155;
    color:white;
    cursor:pointer;
    font-size:16px;
}

.menu button:hover{
    background:#3b82f6;
}

.main{
    flex:1;
    padding:30px;
    background:#f8fafc;
}

.play{
    background:#22c55e;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

.cards{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-top:30px;
}

.card{
    background:white;
    border-radius:15px;
    padding:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.blook{
    font-size:40px;
}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
    <div class="logo">BROLET</div>

    <div class="menu">
        <button>Home</button>
        <button>Play</button>
        <button>Sets</button>
        <button>Stats</button>
    </div>
</div>

<div class="main">

<h1>Welcome to BROLET</h1>

<button class="play">PLAY NOW</button>

<div class="cards">

<div class="card">
<div class="blook">😎</div>
<h2>Classic</h2>
<p>Answer questions and win.</p>
</div>

<div class="card">
<div class="blook">💰</div>
<h2>Gold Rush</h2>
<p>Collect the most gold.</p>
</div>

<div class="card">
<div class="blook">⚔️</div>
<h2>Battle</h2>
<p>Fight other players.</p>
</div>

<div class="card">
<div class="blook">🚀</div>
<h2>Space Race</h2>
<p>Race to the finish.</p>
</div>

</div>
</div>
</div>

</body>
</html>
